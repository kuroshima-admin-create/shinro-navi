function calculateMatch(school, answers) {
  let score = 0, maxScore = 0, reasons = [];
  maxScore += 30;
  if (answers.interest?.length) {
    const m = school.tags.filter(t => answers.interest.includes(t));
    if (m.length > 0) { score += Math.min(30, (m.length / answers.interest.length) * 30 + m.length * 5); reasons.push(`${m.join("・")}に関する学び`); }
  }
  maxScore += 25;
  if (answers.future) {
    if (answers.future === "university" && school.academicLevel >= 4) { score += 25; reasons.push("大学進学に強い"); }
    else if (answers.future === "university" && school.academicLevel === 3) score += 15;
    else if (answers.future === "job" && school.tags.includes("資格取得")) { score += 25; reasons.push("資格取得・就職に強い"); }
    else if (answers.future === "job" && school.tags.includes("就職")) score += 20;
    else if (answers.future === "vocational" && (school.tags.includes("資格取得") || school.academicLevel >= 3)) { score += 20; reasons.push("専門分野の学びが充実"); }
    else if (answers.future === "undecided" && school.tags.includes("バランス")) { score += 20; reasons.push("幅広い進路選択が可能"); }
    else score += 10;
  }
  maxScore += 20;
  if (answers.grades) {
    const minH = Math.min(...school.departments.map(d => d.hensachi));
    const fits = (answers.grades === "5" && minH >= 36) || (answers.grades === "4" && minH <= 61) || (answers.grades === "3" && minH <= 55) || (answers.grades === "2" && minH <= 42);
    const challenge = (answers.grades === "4" && minH >= 55) || (answers.grades === "3" && minH >= 45) || (answers.grades === "2" && minH >= 38);
    if (fits && !challenge) { score += 20; reasons.push("今の成績で合格圏内"); }
    else if (fits && challenge) { score += 15; reasons.push("頑張り次第で合格できる"); }
    else if (!fits) { score += 5; }
  }
  maxScore += 20;
  if (answers.location?.length) {
    if (answers.location.includes("any")) score += 15;
    else if (answers.location.includes(school.region)) { score += 20; reasons.push(`希望エリア（${school.region}）`); }
    else if (school.region === "南部" && answers.location.includes("中南部")) score += 18;
  }
  maxScore += 15;
  if (answers.dormitory) {
    if (answers.dormitory === "school_dorm" && school.dormitory) { score += 15; reasons.push(`学校寮「${school.dormitory.name}」あり`); }
    else if (answers.dormitory === "muraboshi" && school.muraboshi) { score += 15; reasons.push("群星寮から通学可能"); }
    else if (answers.dormitory === "any" && (school.dormitory || school.muraboshi)) { score += 13; if (school.dormitory) reasons.push(`寮「${school.dormitory.name}」あり`); else reasons.push("群星寮から通学可能"); }
    else if (answers.dormitory === "local" && school.region === "八重山") { score += 15; reasons.push("石垣島から通える"); }
    else if (school.dormitory || school.muraboshi) score += 5;
  }
  maxScore += 10;
  if (answers.style?.length) {
    let s = 0;
    if (answers.style.includes("study") && school.academicLevel >= 4) s += 4;
    if (answers.style.includes("club") && school.clubTypes.includes("運動系")) s += 3;
    if (answers.style.includes("license") && school.tags.includes("資格取得")) { s += 4; if (!reasons.some(r => r.includes("資格"))) reasons.push("資格取得に力を入れている"); }
    if (answers.style.includes("small") && school.tags.includes("少人数")) { s += 4; reasons.push("少人数でアットホーム"); }
    if (answers.style.includes("practice") && school.tags.includes("実習")) { s += 4; reasons.push("実習・体験学習が充実"); }
    if (answers.style.includes("lowcost") && school.type === "公立" && school.dormitory && school.dormitory.cost && school.dormitory.cost.includes("22")) s += 4;
    else if (answers.style.includes("lowcost") && school.type === "公立") s += 2;
    score += Math.min(10, s);
  }
  return { score, percentage: Math.min(99, Math.max(12, Math.round((score / maxScore) * 100))), reasons: reasons.slice(0, 4) };
}

function getGradeColor(h) {
  if (h >= 55) return { bg: "rgba(239,68,68,0.15)", border: "rgba(239,68,68,0.4)", text: "#f87171", label: "チャレンジ" };
  if (h >= 45) return { bg: "rgba(251,191,36,0.15)", border: "rgba(251,191,36,0.4)", text: "#fbbf24", label: "標準" };
  return { bg: "rgba(52,211,153,0.15)", border: "rgba(52,211,153,0.4)", text: "#34d399", label: "入りやすい" };
}

        </svg>
        <style>{`@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}} @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}`}</style>
        {[...Array(10)].map((_, i) => <div key={i} style={{ position: "absolute", width: `${2+Math.random()*3}px`, height: `${2+Math.random()*3}px`, borderRadius: "50%", background: "rgba(255,255,255,0.4)", left: `${Math.random()*100}%`, top: `${Math.random()*60}%`, animation: `twinkle ${2+Math.random()*3}s ease-in-out infinite`, animationDelay: `${Math.random()*3}s` }} />)}
      </div>

      <div ref={ref} style={{ position: "relative", zIndex: 1, minHeight: "100vh", overflowY: "auto", padding: "20px", display: "flex", flexDirection: "column", alignItems: "center" }}>
        <div style={{ width: "100%", maxWidth: 580, opacity: fadeIn ? 1 : 0, transform: fadeIn ? "translateY(0)" : "translateY(12px)", transition: "opacity 0.3s ease, transform 0.3s ease" }}>

          {/* WELCOME */}
          {screen === "welcome" && (
            <div style={{ textAlign: "center", paddingTop: "8vh" }}>
              <div style={{ fontSize: 64, marginBottom: 8, animation: "float 3s ease-in-out infinite" }}>🏝️</div>
              <h1 style={{ fontFamily: "'Zen Maru Gothic',sans-serif", fontSize: "clamp(24px,6vw,36px)", fontWeight: 900, color: "#fff", lineHeight: 1.4, marginBottom: 6, textShadow: "0 2px 20px rgba(0,0,0,0.3)" }}>しんろナビ</h1>
              <p style={{ fontFamily: "'Zen Maru Gothic',sans-serif", fontSize: "clamp(13px,3.5vw,16px)", color: "rgba(255,255,255,0.7)", marginBottom: 28, lineHeight: 1.6 }}>黒島中学校のみんなへ<br />きみにぴったりの高校を見つけよう！</p>
              <div style={{ ...card, padding: "24px 20px", marginBottom: 24, textAlign: "left", color: "rgba(255,255,255,0.85)", fontSize: 14, lineHeight: 1.8 }}>
                <div style={{ fontWeight: 700, fontSize: 15, color: "#2ec4b6", marginBottom: 8, fontFamily: "'Zen Maru Gothic',sans-serif" }}>⭐ パワーアップした新機能</div>
                <div style={{ marginBottom: 6 }}>📊 <strong>偏差値・内申点の目安</strong>がわかる！</div>
                <div style={{ marginBottom: 6 }}>🎯 <strong>成績に合った目標設定</strong>ができる！</div>
                <div style={{ marginBottom: 6 }}>🎬 <strong>YouTube動画</strong>で学校の雰囲気を確認！</div>
                <div>🏆 各校の<strong>活躍・ハイライト</strong>を紹介！</div>
              </div>
              <button onClick={() => transition(() => setScreen("quiz"))} style={{ background: "linear-gradient(135deg,#2ec4b6,#17a398)", color: "#fff", border: "none", borderRadius: 60, padding: "16px 48px", fontSize: 18, fontWeight: 700, fontFamily: "'Zen Maru Gothic',sans-serif", cursor: "pointer", boxShadow: "0 4px 24px rgba(46,196,182,0.4)", transition: "transform 0.2s" }} onMouseEnter={e => e.target.style.transform = "scale(1.05)"} onMouseLeave={e => e.target.style.transform = "scale(1)"}>診断スタート 🚀</button>
              <p style={{ color: "rgba(255,255,255,0.35)", fontSize: 11, marginTop: 24 }}>竹富町立黒島中学校 進路支援アプリ</p>
            </div>
          )}

          {/* QUIZ */}
          {screen === "quiz" && (
            <div style={{ paddingTop: 16 }}>
              <div style={{ marginBottom: 24 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ color: "rgba(255,255,255,0.6)", fontSize: 13, fontWeight: 500 }}>質問 {currentQ+1} / {QUESTIONS.length}</span>
                  <span style={{ color: "#2ec4b6", fontSize: 13, fontWeight: 700 }}>{Math.round(((currentQ+1)/QUESTIONS.length)*100)}%</span>
                </div>
                <div style={{ height: 6, borderRadius: 3, background: "rgba(255,255,255,0.1)", overflow: "hidden" }}>
                  <div style={{ height: "100%", borderRadius: 3, background: "linear-gradient(90deg,#2ec4b6,#17a398)", width: `${((currentQ+1)/QUESTIONS.length)*100}%`, transition: "width 0.5s" }} />
                </div>
              </div>
              <div style={{ ...card, padding: "28px 20px", marginBottom: 20 }}>
                <h2 style={{ fontFamily: "'Zen Maru Gothic',sans-serif", fontSize: "clamp(18px,5vw,24px)", fontWeight: 900, color: "#fff", marginBottom: 6, lineHeight: 1.4 }}>{QUESTIONS[currentQ].question}</h2>
                <p style={{ color: "rgba(255,255,255,0.5)", fontSize: 13, marginBottom: 20 }}>{QUESTIONS[currentQ].subtitle}</p>
                <div style={{ display: "grid", gridTemplateColumns: QUESTIONS[currentQ].options.length <= 4 ? "1fr" : "1fr 1fr", gap: 10 }}>
                  {QUESTIONS[currentQ].options.map(opt => {
                    const q = QUESTIONS[currentQ];
                    const sel = q.multi ? (answers[q.id]||[]).includes(opt.value) : answers[q.id] === opt.value;
                    return <button key={opt.value} onClick={() => handleSelect(q.id, opt.value, q.multi)} style={btnStyle(sel)}>
                      <span style={{ fontSize: 22, flexShrink: 0 }}>{opt.icon}</span><span>{opt.label}</span>{sel && <span style={{ marginLeft: "auto", color: "#2ec4b6", fontSize: 16 }}>✓</span>}
                    </button>;
                  })}
                </div>
              </div>
              <div style={{ display: "flex", gap: 12 }}>
                <button onClick={prevQuestion} disabled={currentQ === 0} style={{ flex: 1, padding: 14, borderRadius: 14, border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.05)", color: "rgba(255,255,255,0.6)", fontSize: 15, fontWeight: 600, cursor: currentQ === 0 ? "default" : "pointer", opacity: currentQ === 0 ? 0.3 : 1, fontFamily: "'Noto Sans JP',sans-serif" }}>← もどる</button>
                <button onClick={nextQuestion} style={{ flex: 2, padding: 14, borderRadius: 14, border: "none", background: "linear-gradient(135deg,#2ec4b6,#17a398)", color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer", boxShadow: "0 4px 16px rgba(46,196,182,0.3)", fontFamily: "'Noto Sans JP',sans-serif" }}>{currentQ === QUESTIONS.length-1 ? "結果を見る ✨" : "つぎへ →"}</button>
              </div>
            </div>
          )}

          {/* RESULTS LIST */}
          {screen === "result" && !showDetail && (
            <div style={{ paddingTop: 16, paddingBottom: 40 }}>
              <div style={{ textAlign: "center", marginBottom: 28 }}>
                <div style={{ fontSize: 48, marginBottom: 8 }}>🎉</div>
                <h2 style={{ fontFamily: "'Zen Maru Gothic',sans-serif", fontSize: "clamp(20px,5vw,28px)", fontWeight: 900, color: "#fff", marginBottom: 6 }}>きみへのオススメ高校</h2>
                <p style={{ color: "rgba(255,255,255,0.5)", fontSize: 13 }}>タップすると偏差値・目標成績・動画が見られるよ</p>
              </div>
              {results.slice(0, 8).map((school, idx) => {
                const topDept = school.departments[0];
                const gc = getGradeColor(topDept.hensachi);
                return (
                  <button key={school.id} onClick={() => transition(() => setShowDetail(school))} style={{ ...card, width: "100%", padding: "18px", marginBottom: 14, cursor: "pointer", textAlign: "left", position: "relative", overflow: "hidden", border: idx === 0 ? "2px solid rgba(46,196,182,0.5)" : "1px solid rgba(255,255,255,0.1)", transition: "transform 0.2s" }} onMouseEnter={e => e.currentTarget.style.transform = "scale(1.01)"} onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}>
                    {idx === 0 && <div style={{ position: "absolute", top: 12, right: 12, background: "linear-gradient(135deg,#f7b731,#f5a623)", color: "#000", fontSize: 11, fontWeight: 800, padding: "4px 12px", borderRadius: 20 }}>🏆 BEST MATCH</div>}
                    <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
                      <div style={{ width: 56, height: 56, borderRadius: "50%", flexShrink: 0, background: `conic-gradient(#2ec4b6 ${school.match.percentage*3.6}deg, rgba(255,255,255,0.08) 0deg)`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <div style={{ width: 46, height: 46, borderRadius: "50%", background: "rgba(10,22,40,0.9)", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column" }}>
                          <span style={{ color: "#2ec4b6", fontSize: 16, fontWeight: 900, lineHeight: 1 }}>{school.match.percentage}</span>
                          <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 8 }}>%</span>
                        </div>
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, flexWrap: "wrap" }}>
                          <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 8, background: school.type === "私立" ? "rgba(247,183,49,0.2)" : school.type === "国立" ? "rgba(168,85,247,0.2)" : "rgba(46,196,182,0.15)", color: school.type === "私立" ? "#f7b731" : school.type === "国立" ? "#a855f7" : "#2ec4b6", fontWeight: 600 }}>{school.type}</span>
                          <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 11 }}>{school.area}</span>
                          <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 8, background: gc.bg, border: `1px solid ${gc.border}`, color: gc.text, fontWeight: 600 }}>偏差値{topDept.hensachi}</span>
                        </div>
                        <h3 style={{ fontFamily: "'Zen Maru Gothic',sans-serif", fontSize: 16, fontWeight: 700, color: "#fff", marginBottom: 4 }}>{school.name}</h3>
                        <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", marginBottom: 4 }}>{school.highlights[0]}</div>
                        <div style={{ color: "rgba(46,196,182,0.7)", fontSize: 11, fontWeight: 500 }}>タップして詳細・目標成績・動画を見る →</div>
                      </div>
                    </div>
                  </button>
                );
              })}
              <div style={{ ...card, padding: "20px", marginTop: 20, border: "1px solid rgba(255,215,0,0.2)", background: "rgba(255,215,0,0.05)" }}>
                <div style={{ fontFamily: "'Zen Maru Gothic',sans-serif", fontSize: 15, fontWeight: 700, color: "#f7b731", marginBottom: 8 }}>⭐ 群星（むるぶし）寮について</div>
                <p style={{ color: "rgba(255,255,255,0.7)", fontSize: 13, lineHeight: 1.8 }}>那覇市にある離島生徒のための寮（定員120名）。中南部の高校に通学可能。毎年8〜10月ごろ竹富町教育委員会を通じて募集。月額約37,300円。</p>
              </div>
              <button onClick={restart} style={{ marginTop: 20, width: "100%", padding: 14, borderRadius: 14, border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.05)", color: "rgba(255,255,255,0.6)", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "'Noto Sans JP',sans-serif" }}>🔄 もう一度やり直す</button>
            </div>
          )}

          {/* DETAIL */}
          {screen === "result" && showDetail && (
            <div style={{ paddingTop: 16, paddingBottom: 40 }}>
              <button onClick={() => transition(() => setShowDetail(null))} style={{ background: "none", border: "none", color: "#2ec4b6", fontSize: 14, fontWeight: 600, cursor: "pointer", marginBottom: 16, padding: 0, fontFamily: "'Noto Sans JP',sans-serif" }}>← 一覧にもどる</button>
              <div style={{ ...card, padding: "28px 22px", marginBottom: 16 }}>
                <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "rgba(46,196,182,0.12)", borderRadius: 20, padding: "6px 14px", marginBottom: 16 }}>
                  <span style={{ color: "#2ec4b6", fontWeight: 900, fontSize: 22 }}>{showDetail.match.percentage}%</span>
                  <span style={{ color: "rgba(255,255,255,0.6)", fontSize: 12 }}>マッチ</span>
                </div>
                <div style={{ display: "flex", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 11, padding: "3px 10px", borderRadius: 8, background: showDetail.type === "私立" ? "rgba(247,183,49,0.2)" : showDetail.type === "国立" ? "rgba(168,85,247,0.2)" : "rgba(46,196,182,0.15)", color: showDetail.type === "私立" ? "#f7b731" : showDetail.type === "国立" ? "#a855f7" : "#2ec4b6", fontWeight: 600 }}>{showDetail.type}</span>
                  <span style={{ fontSize: 11, padding: "3px 10px", borderRadius: 8, background: "rgba(255,255,255,0.08)", color: "rgba(255,255,255,0.6)" }}>📍 {showDetail.area}</span>
                </div>
                <h2 style={{ fontFamily: "'Zen Maru Gothic',sans-serif", fontSize: "clamp(22px,5vw,28px)", fontWeight: 900, color: "#fff", marginBottom: 12, lineHeight: 1.3 }}>{showDetail.name}</h2>
                <p style={{ color: "rgba(255,255,255,0.7)", fontSize: 14, lineHeight: 1.8, marginBottom: 20 }}>{showDetail.description}</p>

                {/* 📊 Academic Requirements */}
                <div style={{ background: "rgba(99,102,241,0.08)", borderRadius: 16, padding: 18, marginBottom: 20, border: "1px solid rgba(99,102,241,0.2)" }}>
                  <h3 style={{ color: "#818cf8", fontSize: 15, fontWeight: 700, marginBottom: 12, fontFamily: "'Zen Maru Gothic',sans-serif" }}>📊 合格に必要な成績の目安</h3>
                  {showDetail.departments.map((d, i) => {
                    const gc = getGradeColor(d.hensachi);
                    return (
                      <div key={i} style={{ background: "rgba(255,255,255,0.04)", borderRadius: 12, padding: "12px 14px", marginBottom: i < showDetail.departments.length - 1 ? 10 : 0, border: `1px solid ${gc.border}` }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                          <span style={{ color: "#fff", fontWeight: 700, fontSize: 14 }}>{d.name}</span>
                          <span style={{ fontSize: 11, padding: "2px 10px", borderRadius: 8, background: gc.bg, color: gc.text, fontWeight: 700 }}>{gc.label}</span>
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                          <div style={{ textAlign: "center" }}>
                            <div style={{ color: "rgba(255,255,255,0.4)", fontSize: 10, marginBottom: 2 }}>偏差値</div>
                            <div style={{ color: gc.text, fontSize: 20, fontWeight: 900 }}>{d.hensachi}</div>
                          </div>
                          <div style={{ textAlign: "center" }}>
                            <div style={{ color: "rgba(255,255,255,0.4)", fontSize: 10, marginBottom: 2 }}>内申点</div>
                            <div style={{ color: "#fff", fontSize: 14, fontWeight: 700 }}>{d.naishin}</div>
                          </div>
                          <div style={{ textAlign: "center" }}>
                            <div style={{ color: "rgba(255,255,255,0.4)", fontSize: 10, marginBottom: 2 }}>本番得点</div>
                            <div style={{ color: "#fff", fontSize: 14, fontWeight: 700 }}>{d.score}</div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  <div style={{ marginTop: 12, padding: "10px 14px", background: "rgba(129,140,248,0.1)", borderRadius: 10, color: "rgba(255,255,255,0.8)", fontSize: 13, lineHeight: 1.7 }}>
                    💡 <strong>アドバイス：</strong>{showDetail.gradeAdvice}
                  </div>
                  <div style={{ marginTop: 8, color: "rgba(255,255,255,0.4)", fontSize: 11 }}>
                    ※内申点は165点満点（5教科×5＋実技4教科×5×1.5）。成績の目安は参考値です。
                  </div>
                </div>

                {/* 🏆 Highlights */}
                <div style={{ marginBottom: 20 }}>
                  <h3 style={{ color: "#f7b731", fontSize: 15, fontWeight: 700, marginBottom: 12, fontFamily: "'Zen Maru Gothic',sans-serif" }}>🏆 この学校の活躍・特色</h3>
                  {showDetail.highlights.map((h, i) => (
                    <div key={i} style={{ padding: "10px 0", color: "rgba(255,255,255,0.85)", fontSize: 13, lineHeight: 1.6, borderBottom: i < showDetail.highlights.length - 1 ? "1px solid rgba(255,255,255,0.06)" : "none" }}>{h}</div>
                  ))}
                </div>

                {/* 🎬 YouTube */}
                <a href={`https://www.youtube.com/results?search_query=${encodeURIComponent(showDetail.youtubeQuery)}`} target="_blank" rel="noopener noreferrer" style={{ display: "block", padding: "16px", borderRadius: 14, background: "rgba(255,0,0,0.1)", border: "1px solid rgba(255,0,0,0.25)", textDecoration: "none", marginBottom: 20, textAlign: "center" }}>
                  <div style={{ fontSize: 28, marginBottom: 6 }}>▶️</div>
                  <div style={{ color: "#ff6b6b", fontSize: 15, fontWeight: 700, fontFamily: "'Zen Maru Gothic',sans-serif" }}>YouTubeで学校の動画を見る</div>
                  <div style={{ color: "rgba(255,255,255,0.5)", fontSize: 12, marginTop: 4 }}>「{showDetail.youtubeQuery}」の検索結果を表示します</div>
                </a>

                {/* 🏠 Dormitory */}
                <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: 14, padding: 16, marginBottom: 20, border: "1px solid rgba(255,255,255,0.08)" }}>
                  <h3 style={{ color: "#f7b731", fontSize: 14, fontWeight: 700, marginBottom: 10, fontFamily: "'Zen Maru Gothic',sans-serif" }}>🏠 住まい情報</h3>
                  {showDetail.dormitory ? (
                    <div style={{ color: "rgba(255,255,255,0.7)", fontSize: 13, lineHeight: 1.8 }}>
                      <div>🔹 学校寮: <strong style={{ color: "#fff" }}>{showDetail.dormitory.name}</strong></div>
                      <div>🔹 定員: {showDetail.dormitory.capacity ? `${showDetail.dormitory.capacity}名` : "要確認"}</div>
                      <div>🔹 寮費: {showDetail.dormitory.cost}</div>
                      {showDetail.muraboshi && <div style={{ marginTop: 4 }}>⭐ 群星寮からも通学可能</div>}
                    </div>
                  ) : showDetail.muraboshi ? (
                    <div style={{ color: "rgba(255,255,255,0.7)", fontSize: 13, lineHeight: 1.8 }}>
                      <div>⭐ <strong style={{ color: "#f7b731" }}>群星寮</strong>から通学できます</div>
                      <div>🔹 定員120名 / 月額約37,300円</div>
                    </div>
                  ) : (
                    <div style={{ color: "rgba(255,255,255,0.5)", fontSize: 13 }}>学校に直接お問い合わせください</div>
                  )}
                </div>

                {/* Match reasons */}
                {showDetail.match.reasons.length > 0 && (
                  <div style={{ marginBottom: 20 }}>
                    <h3 style={{ color: "#2ec4b6", fontSize: 14, fontWeight: 700, marginBottom: 10, fontFamily: "'Zen Maru Gothic',sans-serif" }}>✨ オススメの理由</h3>
                    {showDetail.match.reasons.map((r, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0", color: "rgba(255,255,255,0.8)", fontSize: 13, borderBottom: i < showDetail.match.reasons.length - 1 ? "1px solid rgba(255,255,255,0.06)" : "none" }}>
                        <span style={{ color: "#2ec4b6" }}>✓</span> {r}
                      </div>
                    ))}
                  </div>
                )}

                {showDetail.url && (
                  <a href={showDetail.url} target="_blank" rel="noopener noreferrer" style={{ display: "block", textAlign: "center", padding: 14, borderRadius: 14, background: "linear-gradient(135deg,#2ec4b6,#17a398)", color: "#fff", fontSize: 14, fontWeight: 700, textDecoration: "none", fontFamily: "'Noto Sans JP',sans-serif" }}>学校の公式サイトを見る 🔗</a>
                )}
              </div>
              <button onClick={() => transition(() => setShowDetail(null))} style={{ width: "100%", padding: 14, borderRadius: 14, border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.05)", color: "rgba(255,255,255,0.6)", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "'Noto Sans JP',sans-serif" }}>← 一覧にもどる</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

    // Render
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
